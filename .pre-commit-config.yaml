repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --frozen pyright src/clawbench tests
        language: system
        pass_filenames: false
